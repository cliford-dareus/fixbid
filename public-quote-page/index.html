<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote - Cliford Dareus Handyman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .tail-container { max-width: 680px; margin: 0 auto; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen py-8">
<div class="tail-container bg-white shadow-2xl rounded-3xl overflow-hidden mx-4">

    <!-- Header -->
    <div class="bg-blue-600 text-white py-12 px-8 text-center">
        <h1 class="text-4xl font-bold">Your Handyman Quote</h1>
        <p class="mt-3 text-blue-100 text-lg">Cliford Dareus • Professional Handyman Services</p>
        <p class="text-blue-200 text-sm mt-1">South Florida</p>
    </div>

    <div id="loading" class="p-12 text-center">
        <div class="animate-spin w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"></div>
        <p class="mt-6 text-gray-600">Loading your quote...</p>
    </div>

    <div id="content" class="hidden p-8">
        <!-- Dynamic content injected by JavaScript -->
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const quoteId = urlParams.get('id');

    async function loadQuote() {
        if (!quoteId) {
            showError("Quote ID is missing from the link.");
            return;
        }

        try {
            const res = await fetch(`https://nzuqlglokhgdukcxhvit.supabase.co/functions/v1/public-quote?id=${quoteId}`);
            const result = await res.json();

            if (!result.success || !result.quote) {
                throw new Error("Quote not found");
            }

            renderQuote(result.quote);
        } catch (err) {
            showError("Could not load quote. Please ask Cliford to resend the link.");
        }
    }

    function renderQuote(quote) {
        document.getElementById('loading').classList.add('hidden');
        const content = document.getElementById('content');
        content.classList.remove('hidden');

        const depositAmount = Math.round(quote.total_amount * 0.5);

        let html = `
        <div class="text-center mb-10">
          <h2 class="text-3xl font-semibold text-gray-800">Hello ${quote.client_name}!</h2>
          <div class="text-6xl font-bold text-green-600 mt-6">$${quote.total_amount}</div>
          <p class="text-gray-500 mt-1">Total Estimate</p>
        </div>
      `;

        quote.line_items.forEach(item => {
            html += `
          <div class="mb-8 bg-gray-50 p-6 rounded-2xl">
            <h3 class="font-medium text-lg">${item.description}</h3>
            <p class="text-2xl font-semibold text-green-600 mt-3">
              $${item.unit_price} × ${item.quantity} = $${(item.unit_price * item.quantity).toFixed(2)}
            </p>
            ${item.photo_url ? `<img src="${item.photo_url}" class="mt-5 w-full rounded-xl shadow-sm" />` : ''}
          </div>
        `;
        });

        if (quote.notes) {
            html += `<div class="bg-amber-50 p-6 rounded-2xl mt-8"><strong>Notes from Cliford:</strong><br>${quote.notes}</div>`;
        }

        html += `
        <button onclick="payDeposit(${depositAmount}, '${quote.id}', '${quote.client_name}')"
          class="w-full bg-green-600 hover:bg-green-700 transition-colors text-white font-semibold text-xl py-7 rounded-3xl mt-12 shadow-lg">
          Pay $${depositAmount} Deposit Now (50%)
        </button>

        <p class="text-center text-gray-500 text-sm mt-10">
          Secure payment powered by Stripe<br>
          Questions? Text or call Cliford directly
        </p>
      `;

        content.innerHTML = html;
    }

    async function payDeposit(depositAmount, quoteId, clientName) {
        try {
            const res = await fetch('https://nzuqlglokhgdukcxhvit.supabase.co/functions/v1/create-checkout-session', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    quote_id: quoteId,
                    deposit_amount: depositAmount,
                    client_name: clientName
                })
            });

            const data = await res.json();

            if (data.error) throw new Error(data.error);
            if (data.url) {
                window.location.href = data.url;   // Redirect to Stripe Checkout
            }
        } catch (err) {
            alert("Unable to start payment. Please try again or contact Cliford.");
            console.error(err);
        }
    }

    function showError(message) {
        document.getElementById('loading').innerHTML = `
        <p class="text-red-600 text-center py-12">${message}</p>
      `;
    }

    // Load the quote when page opens
    loadQuote();
</script>
</body>
</html>
